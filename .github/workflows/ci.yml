name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint gate (adaptive)
        shell: bash
        run: |
          SCRIPTS="$(npm run)"
          if echo "$SCRIPTS" | grep -q "lint:check:base"; then
            npm run lint:check:base
          elif echo "$SCRIPTS" | grep -q "lint:check"; then
            npm run lint:check
          elif echo "$SCRIPTS" | grep -q "lint"; then
            npm run lint
          else
            npx eslint . --cache
          fi

      - name: Test gate (adaptive)
        shell: bash
        run: |
          SCRIPTS="$(npm run)"
          if echo "$SCRIPTS" | grep -q "test:gate"; then
            npm run test:gate
          elif echo "$SCRIPTS" | grep -q "test:unit"; then
            npm run test:unit
          elif echo "$SCRIPTS" | grep -q "test"; then
            npm test
          else
            echo "No test script found, skip test gate for now."
          fi

      - name: Build gate
        run: npm run build
